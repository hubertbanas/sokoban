name: Auto Tag Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - "package.json" # This action ONLY runs when package.json changes

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the action permission to push tags and create releases
    outputs:
      current_version: ${{ steps.detect.outputs.current_version }}
      skip_tag: ${{ steps.detect.outputs.skip_tag }}
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
      tag_created: ${{ steps.create_tag.outputs.tag_created }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Pulls down all existing tags to avoid duplicates

      - name: Detect Version Change
        id: detect
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(jq -r .version package.json)"
          BEFORE_SHA="${{ github.event.before }}"

          if [ -n "$BEFORE_SHA" ] \
            && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            PREVIOUS_VERSION="$(git show "$BEFORE_SHA":package.json 2>/dev/null | jq -r .version || true)"
          else
            PREVIOUS_VERSION=""
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" = "null" ]; then
            echo "No valid version found in package.json"
            exit 1
          fi

          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$CURRENT_VERSION' is not a valid SemVer string."
            exit 1
          fi

          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Version unchanged ($CURRENT_VERSION). Skipping tag creation."
            echo "skip_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "skip_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Release GPG Key
        id: import_gpg
        if: steps.detect.outputs.skip_tag != 'true'
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          git_user_signingkey: true

      - name: Configure Git Identity From GPG Key
        if: steps.detect.outputs.skip_tag != 'true'
        run: |
          set -euo pipefail
          git config user.name "${{ steps.import_gpg.outputs.name }}"
          git config user.email "${{ steps.import_gpg.outputs.email }}"

      - name: Create and Push Tag
        id: create_tag
        if: steps.detect.outputs.skip_tag != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT_VERSION="${{ steps.detect.outputs.current_version }}"
          TAG="v$CURRENT_VERSION"

          # Check existing tag through the GitHub API.
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating signed tag and release: $TAG"

            # Extract the specific version's release notes from CHANGELOG.md
            if [ ! -f CHANGELOG.md ]; then
              echo "CHANGELOG.md is required to build release notes."
              exit 1
            fi

            if ! awk -v ver="$CURRENT_VERSION" '
              BEGIN { found=0; capture=0 }
              $0 ~ "^## \\[" ver "\\]" {
                found=1
                capture=1
              }
              /^## \[/ && capture && $0 !~ "^## \\[" ver "\\]" {
                exit
              }
              capture { print }
              END {
                if (!found) {
                  exit 2
                }
              }
            ' CHANGELOG.md > release_notes.md; then
              echo "No changelog section found for version $CURRENT_VERSION in CHANGELOG.md"
              exit 1
            fi

            if [ ! -s release_notes.md ]; then
              echo "Extracted release notes for $CURRENT_VERSION are empty."
              exit 1
            fi

            # Create and push a signed, annotated tag.
            git tag -s "$TAG" -m "Release $TAG" "${GITHUB_SHA}"
            git push origin "$TAG"

            # Create the release from the signed tag.
            gh release create "$TAG" \
              --verify-tag \
              --title "Release $TAG" \
              --notes-file release_notes.md

            echo "tag_created=true" >> "$GITHUB_OUTPUT"
          fi

  # Publish targets for a newly created release tag.
  # Add more publish jobs here (for example Docker Hub, ECR, or ACR).
  publish-ghcr:
    needs: create-tag
    if: needs.create-tag.outputs.tag_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-ghcr.yml
    with:
      tag: ${{ needs.create-tag.outputs.current_version }}
      publish_latest: ${{ needs.create-tag.outputs.is_prerelease != 'true' }}
    secrets: inherit

  # Deployment targets for a newly created release tag.
  # Add more deploy jobs here (for example Netlify, Cloudflare Pages, or S3/CDN).
  deploy-github-pages:
    needs: create-tag
    if: needs.create-tag.outputs.tag_created == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-github-pages.yml
    with:
      tag: ${{ needs.create-tag.outputs.current_version }}
    secrets: inherit

  publish-desktop:
    needs: create-tag
    if: needs.create-tag.outputs.tag_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/publish-desktop.yml
    with:
      tag: ${{ needs.create-tag.outputs.current_version }}
    secrets: inherit

  publish-android:
    needs: create-tag
    if: needs.create-tag.outputs.tag_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/publish-android.yml
    with:
      tag: ${{ needs.create-tag.outputs.current_version }}
    secrets: inherit
