name: Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      tag:
        description: "Version without leading v (example: 1.2.3)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Skip prerelease tags (for example v1.15.0-rc.1) across all trigger paths.
    if: (inputs.tag == '' && !contains(github.ref_name, '-')) || (inputs.tag != '' && !contains(inputs.tag, '-'))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository at release tag
        if: inputs.tag != ''
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.tag }}

      - name: Checkout repository
        if: inputs.tag == ''
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Vite App
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
