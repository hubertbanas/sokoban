name: Build and Publish Android APK

on:
  workflow_call:
    inputs:
      tag:
        description: "Version without leading v (example: 1.2.3)"
        required: true
        type: string
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      RELEASE_GPG_PRIVATE_KEY:
        required: true
      RELEASE_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Version without leading v (example: 1.2.3)"
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.tag }}

      # Capacitor requires Java 21 to compile the Android project
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web app
        run: yarn build

      # Syncs the dist folder into the native Android platform
      - name: Sync Capacitor
        run: npx cap sync android

      # Decode the Base64-encoded keystore secret into a binary keystore file
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build Android Release Artifacts
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Import Release GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_GPG_PASSPHRASE }}

      - name: Generate Android checksums and signatures
        run: |
          set -euo pipefail
          for file in \
            android/app/build/outputs/apk/release/app-release.apk \
            android/app/build/outputs/bundle/release/app-release.aab; do
            sha256sum "$file" > "${file}.sha256"
            gpg --batch --yes --armor --detach-sign --output "${file}.asc" "$file"
          done

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-build-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-build-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Android checksum/signature artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-build-release-signatures
          path: |
            android/app/build/outputs/apk/release/app-release.apk.sha256
            android/app/build/outputs/apk/release/app-release.apk.asc
            android/app/build/outputs/bundle/release/app-release.aab.sha256
            android/app/build/outputs/bundle/release/app-release.aab.asc
          if-no-files-found: error

      - name: Remove decoded keystore
        if: always()
        run: rm -f android/app/keystore.jks

      - name: Upload APK to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/apk/release/app-release.apk
          asset_name: Sokoban-${{ inputs.tag }}.apk
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload APK checksum to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/apk/release/app-release.apk.sha256
          asset_name: Sokoban-${{ inputs.tag }}.apk.sha256
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload APK signature to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/apk/release/app-release.apk.asc
          asset_name: Sokoban-${{ inputs.tag }}.apk.asc
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AAB to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/bundle/release/app-release.aab
          asset_name: Sokoban-${{ inputs.tag }}.aab
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AAB checksum to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/bundle/release/app-release.aab.sha256
          asset_name: Sokoban-${{ inputs.tag }}.aab.sha256
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AAB signature to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: android/app/build/outputs/bundle/release/app-release.aab.asc
          asset_name: Sokoban-${{ inputs.tag }}.aab.asc
          tag: v${{ inputs.tag }}
          overwrite: true
