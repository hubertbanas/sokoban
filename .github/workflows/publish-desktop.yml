name: Build and Publish Desktop Apps

on:
  workflow_call:
    inputs:
      tag:
        description: "Version without leading v (example: 1.2.3)"
        required: true
        type: string
    secrets:
      RELEASE_GPG_PRIVATE_KEY:
        required: true
      RELEASE_GPG_PASSPHRASE:
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Version without leading v (example: 1.2.3)"
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
            release_pattern: dist-desktop/*.exe
            artifact_name: desktop-build-windows
          - os: macos-latest
            release_pattern: dist-desktop/*.dmg
            artifact_name: desktop-build-macos

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Set up QEMU for ARM emulation
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils rpm libarchive-tools zstd
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Linux build tooling diagnostics
        if: runner.os == 'Linux'
        run: |
          flatpak --version
          flatpak-builder --version
          flatpak remotes --user
          bsdtar --version || true
          zstd --version || true
          rpm --version || true
          snapcraft --version || true

      - name: Build and package desktop app
        run: yarn build:desktop
        env:
          DEBUG: flatpak-bundler
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import Release GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.RELEASE_GPG_PASSPHRASE }}

      - name: Generate Software Bill of Materials (SBOM)
        if: runner.os == 'Linux'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate source code tarball
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          git archive \
            --format=tar.gz \
            --prefix=Sokoban-source-${{ inputs.tag }}/ \
            --output=dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz \
            HEAD

      - name: Generate Windows checksums and signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem dist-desktop -Filter *.exe -File
          foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii -NoNewline
            gpg --batch --yes --armor --detach-sign --output "$($file.FullName).asc" "$($file.FullName)"
          }

      - name: Generate Linux checksums and signatures
        if: runner.os == 'Linux'
        working-directory: dist-desktop
        run: |
          set -euo pipefail
          for file in *.AppImage *.flatpak *.snap *.deb *.rpm *.pacman Sokoban-SBOM-${{ inputs.tag }}.spdx.json Sokoban-source-${{ inputs.tag }}.tar.gz; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "${file}.sha256"
              gpg --batch --yes --armor --detach-sign --output "${file}.asc" "$file"
              if [[ "$file" == *.tar.gz ]]; then
                gpg --batch --yes --armor --detach-sign --output "${file}.sha256.asc" "${file}.sha256"
              fi
            fi
          done

      - name: Generate MacOS checksums and signatures
        if: runner.os == 'macOS'
        working-directory: dist-desktop
        run: |
          set -euo pipefail
          for file in *.dmg; do
            if [ -f "$file" ]; then
              shasum -a 256 "$file" > "${file}.sha256"
              gpg --batch --yes --armor --detach-sign --output "${file}.asc" "$file"
            fi
          done

      - name: Upload desktop artifact bundle
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_pattern }}
          if-no-files-found: error

      - name: Upload Windows checksum/signature artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-windows-signatures
          path: |
            dist-desktop/*.exe.sha256
            dist-desktop/*.exe.asc
          if-no-files-found: error

      - name: Upload MacOS DMG to artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_pattern }}
          if-no-files-found: error

      - name: Upload MacOS checksum/signature artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-macos-signatures
          path: |
            dist-desktop/*.dmg.sha256
            dist-desktop/*.dmg.asc
          if-no-files-found: error

      - name: Upload Linux AppImage artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-appimage
          path: dist-desktop/*.AppImage
          if-no-files-found: error

      - name: Upload Linux Flatpak artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-flatpak
          path: dist-desktop/*.flatpak
          if-no-files-found: error

      - name: Upload Linux Snap artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-snap
          path: dist-desktop/*.snap
          if-no-files-found: error

      - name: Upload Linux Debian artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-deb
          path: dist-desktop/*.deb
          if-no-files-found: error

      - name: Upload Linux RPM artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-rpm
          path: dist-desktop/*.rpm
          if-no-files-found: error

      - name: Upload Linux pacman artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-pacman
          path: dist-desktop/*.pacman
          if-no-files-found: error

      - name: Upload Linux source archive artifact bundle
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-source
          path: dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz
          if-no-files-found: error

      - name: Upload Linux checksum/signature artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-signatures
          path: |
            dist-desktop/*.AppImage.sha256
            dist-desktop/*.AppImage.asc
            dist-desktop/*.flatpak.sha256
            dist-desktop/*.flatpak.asc
            dist-desktop/*.snap.sha256
            dist-desktop/*.snap.asc
            dist-desktop/*.deb.sha256
            dist-desktop/*.deb.asc
            dist-desktop/*.rpm.sha256
            dist-desktop/*.rpm.asc
            dist-desktop/*.pacman.sha256
            dist-desktop/*.pacman.asc
            dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json.sha256
            dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json.asc
            dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.sha256
            dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.asc
            dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.sha256.asc
          if-no-files-found: error

      - name: Upload binaries to GitHub Release
        if: runner.os == 'Windows'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.release_pattern }}
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Windows checksums to GitHub Release
        if: runner.os == 'Windows'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.exe.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Windows signatures to GitHub Release
        if: runner.os == 'Windows'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.exe.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AppImage to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.AppImage
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AppImage checksums/signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.AppImage.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload AppImage signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.AppImage.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Flatpak to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.flatpak
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Flatpak checksums to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.flatpak.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Flatpak signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.flatpak.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Snap to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.snap
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Snap checksums to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.snap.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Snap signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.snap.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Debian package to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.deb
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Debian checksums to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.deb.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload Debian signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.deb.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload RPM package to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.rpm
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload RPM checksums to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.rpm.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload RPM signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.rpm.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload pacman package to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.pacman
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload pacman checksums to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.pacman.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload pacman signatures to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.pacman.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload SBOM to artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: desktop-build-linux-sbom
          path: dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json
          if-no-files-found: error

      - name: Upload SBOM to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload SBOM checksum to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json.sha256
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload SBOM signature to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-SBOM-${{ inputs.tag }}.spdx.json.asc
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload source archive to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload source archive checksum to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.sha256
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload source archive signature to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.asc
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload source checksum signature to GitHub Release
        if: runner.os == 'Linux'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/Sokoban-source-${{ inputs.tag }}.tar.gz.sha256.asc
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload DMG to GitHub Release
        if: runner.os == 'macOS'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.dmg
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload DMG checksums to GitHub Release
        if: runner.os == 'macOS'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.dmg.sha256
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true

      - name: Upload DMG signatures to GitHub Release
        if: runner.os == 'macOS'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist-desktop/*.dmg.asc
          file_glob: true
          tag: v${{ inputs.tag }}
          overwrite: true
