name: Build and Push Docker Image

on:
    workflow_call:
        inputs:
            tag:
                description: "Version without leading v (example: 1.2.3)"
                required: true
                type: string
            publish_latest:
                description: "Also publish latest tag"
                required: false
                default: false
                type: boolean
    workflow_dispatch:
        inputs:
            tag:
                description: "Version without leading v (example: 1.2.3)"
                required: true
                type: string
            publish_latest:
                description: "Also publish latest tag"
                required: false
                default: false
                type: boolean

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository at release tag
              uses: actions/checkout@v4
              with:
                  ref: refs/tags/v${{ inputs.tag }}

            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container
                  use: true

            - name: Log in to the Container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ inputs.tag }}
                      type=sha,format=long
                      type=raw,value=latest,enable=${{ inputs.publish_latest }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  builder: ${{ steps.buildx.outputs.name }}
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
