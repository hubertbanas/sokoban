$schema: https://docs.renovatebot.com/renovate-schema.json
extends:
  - "config:recommended"

# Run dependency updates over the weekend
schedule:
  - "on friday and saturday"

timezone: America/New_York
dependencyDashboard: true
prConcurrentLimit: 5

packageRules:
  - matchUpdateTypes:
      - minor
      - patch
    groupName: all non-major dependencies
    automerge: false

assignees:
  - hubertbanas
